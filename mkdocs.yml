site_name: Jane's Tech Blog
site_url: https://jihyeonjane.github.io
site_author: Jane
site_description: Data Engineering & SRE 기술 블로그

repo_url: https://github.com/jihyeonjane/jihyeonjane.github.io
repo_name: jihyeonjane.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  language: ko
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/custom.css
  - stylesheets/terminal.css
  - stylesheets/flow.css
  - stylesheets/ch-anim.css
  - stylesheets/k8s.css

extra_javascript:
  - javascripts/terminal.js
  - javascripts/flow.js
  - javascripts/clickhouse.js
  - javascripts/k8s.js

plugins:
  - search:
      lang:
        - ko
        - en
  - git-revision-date-localized:
      type: date
      locale: ko
      enable_creation_date: true
      fallback_to_build_date: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - dbt Tutorial:
    - dbt-tutorial/index.md
    - 1. dbt란?: dbt-tutorial/01-what-is-dbt.md
    - 2. 설치 및 설정: dbt-tutorial/02-setup.md
    - 3. 프로젝트 구조: dbt-tutorial/03-project-structure.md
    - 4. 모델 작성: dbt-tutorial/04-models.md
    - 5. Materialization 심화:
      - dbt-tutorial/05-materialization.md
      - "[참고] ClickHouse 구조의 이해": dbt-tutorial/05-clickhouse.md
    - 6. 테스트와 문서화: dbt-tutorial/06-tests-and-docs.md
    - 7. 실전 팁: dbt-tutorial/07-tips.md
    - 8. 데모: dbt-tutorial/07-demo.md
    - 9. 인터랙티브 데모: dbt-tutorial/08-interactive-demo.md
    - "dbt에서 Semantic Layer까지":
      - dbt-tutorial/09-semantic-layer.md
      - "[참고] MCP로 자체 Semantic Layer API": dbt-tutorial/09-semantic-layer-mcp.md
      - "[참고] Text-to-SQL 심화 — VectorDB + 온톨로지": dbt-tutorial/09-text-to-sql.md
      - "[참고] 자연어 질의 시스템 설계 — 역질문 구체화": dbt-tutorial/09-nl-query-design.md
  - Kubernetes Tutorial:
    - k8s-tutorial/index.md
    - 1. Docker 기초: k8s-tutorial/01-docker-basics.md
    - 2. 컨테이너에서 K8s로: k8s-tutorial/02-container-to-k8s.md
    - 3. K8s 아키텍처: k8s-tutorial/03-k8s-architecture.md
    - 4. kubeconfig 상세: k8s-tutorial/04-kubeconfig.md
    - 5. YAML 매니페스트: k8s-tutorial/05-yaml-manifests.md
    - 6. 워크로드: k8s-tutorial/06-workloads.md
    - 7. 네트워킹: k8s-tutorial/07-networking.md
    - 8. 스토리지와 설정: k8s-tutorial/08-volumes.md
    - 9. 배포 전략: k8s-tutorial/09-deployment-strategies.md
    - 10. 인터랙티브 데모: k8s-tutorial/10-interactive-demo.md
    - "Bonus: dbt + Airflow on K8s": k8s-tutorial/11-dbt-airflow-on-k8s.md
  - MCP Tutorial:
    - mcp/index.md
    - 1. MCP란?: mcp/01-what-is-mcp.md
    - 2. 아키텍처: mcp/02-architecture.md
    - 3. 개발 환경 설정: mcp/03-dev-setup.md
    - 4. 첫 번째 MCP 서버: mcp/04-first-server.md
    - 5. PoC - DB 조회 서버: mcp/05-poc.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jihyeonjane
